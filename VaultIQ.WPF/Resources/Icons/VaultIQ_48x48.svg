<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <title>VaultIQ — 48x48</title>

  <!-- Background -->
  <rect width="48" height="48" rx="10" fill="#0C1E3A"/>

  <!-- Vault top -->
  <rect x="8" y="8" width="32" height="22" rx="6"
        fill="none" stroke="#378ADD" stroke-width="3"/>

  <!-- Body -->
  <rect x="13" y="27" width="18" height="13" rx="4" fill="#378ADD"/>

  <!-- Lock -->
  <circle cx="22" cy="33" r="3" fill="#0C1E3A"/>
  <rect x="20.5" y="33" width="3" height="5" rx="1" fill="#0C1E3A"/>

  <!-- IQ badge -->
  <rect x="28" y="22" width="12" height="8" rx="2.5" fill="#1D9E75"/>

  <!-- Text centered properly -->
  <text x="34" y="27.5"
        text-anchor="middle"
        font-family="Georgia, serif"
        font-size="5"
        font-weight="700"
        fill="#E1F5EE">
    IQ
  </text>
</svg>