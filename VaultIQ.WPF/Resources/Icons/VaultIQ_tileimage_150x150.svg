<svg xmlns="http://www.w3.org/2000/svg" width="150" height="150" viewBox="0 0 150 150">
  <title>VaultIQ — Windows Tile 150x150</title>

  <!-- Background -->
  <rect width="150" height="150" fill="#185FA5" />

  <!-- Card -->
  <rect x="25" y="25" width="100" height="100" rx="20" fill="#0C1E3A" />

  <!-- Vault -->
  <rect x="35" y="33" width="64" height="46" rx="10"
        fill="none" stroke="#378ADD" stroke-width="5.5" />

  <!-- Body -->
  <rect x="44" y="75" width="38" height="28" rx="8" fill="#378ADD" />

  <!-- Lock -->
  <circle cx="63" cy="89" r="7" fill="#0C1E3A" />
  <rect x="59.5" y="89" width="7" height="11" rx="2.5" fill="#0C1E3A" />

  <!-- IQ badge -->
  <rect x="73" y="60" width="28" height="19" rx="6" fill="#1D9E75" />

  <!-- Centered IQ text -->
  <text x="87" y="70"
        text-anchor="middle"
        font-family="Georgia, serif"
        font-size="11"
        font-weight="700"
        fill="#E1F5EE">
    IQ
  </text>

  <!-- Brand name -->
  <text x="75" y="135"
        text-anchor="middle"
        font-family="Segoe UI, Arial, sans-serif"
        font-size="14"
        fill="#FFFFFF">
    Vault
    <tspan font-weight="700" fill="#378ADD">IQ</tspan>
  </text>
</svg>