<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <title>VaultIQ — 256x256</title>

  <!-- Background -->
  <rect width="256" height="256" rx="50" fill="#0C1E3A" />

  <!-- Top light -->
  <rect x="1" y="1" width="254" height="127" rx="50"
        fill="#112236" opacity="0.4" />

  <!-- Vault frame -->
  <rect x="56" y="48" width="164" height="118" rx="26"
        fill="none" stroke="#378ADD" stroke-width="13" />
  <rect x="56" y="48" width="164" height="118" rx="26"
        fill="none" stroke="#5DCAA5" stroke-width="1.2" opacity="0.25" />

  <!-- Top highlight line -->
  <rect x="56" y="47" width="164" height="3" rx="1.5"
        fill="#5DCAA5" opacity="0.15" />

  <!-- Body -->
  <rect x="88" y="158" width="98" height="72" rx="18" fill="#378ADD" />

  <!-- Lock -->
  <circle cx="137" cy="194" r="16" fill="#0C1E3A" />
  <rect x="130.5" y="194" width="14" height="22" rx="5" fill="#0C1E3A" />

  <!-- IQ badge -->
  <rect x="164" y="126" width="66" height="46" rx="12" fill="#1D9E75" />

  <!-- Centered text (fixed) -->
  <text x="197" y="148"
        text-anchor="middle"
        font-family="Georgia, serif"
        font-size="26"
        font-weight="700"
        fill="#E1F5EE">
    IQ
  </text>
</svg>