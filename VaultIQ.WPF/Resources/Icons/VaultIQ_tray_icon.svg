<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
  <title>VaultIQ — System Tray 24x24</title>

  <!-- Background -->
  <rect width="24" height="24" rx="5" fill="#0C1E3A" />

  <!-- Vault top -->
  <rect x="4" y="3" width="14" height="10" rx="3"
        fill="none" stroke="#378ADD" stroke-width="2" />

  <!-- Body -->
  <rect x="6" y="12" width="9" height="7" rx="2" fill="#378ADD" />

  <!-- Lock -->
  <circle cx="10.5" cy="15.5" r="1.8" fill="#0C1E3A" />

  <!-- IQ badge (slightly aligned) -->
  <rect x="14.5" y="9" width="6" height="4" rx="1.5" fill="#1D9E75" />
</svg>